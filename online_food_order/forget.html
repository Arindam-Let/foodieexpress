<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forget password</title>
    <!-- Bootstrap css cdn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <!-- css link -->
    <link rel="stylesheet" href="./css/forget.css">
</head>

<body>
    <section class="forgot-section d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7 col-sm-10">
                    <div class="forgot-card text-center">
                        <h3>Forgot Password?</h3>
                        <p>
                            Don’t worry! Enter your registered email and we’ll
                            send you a password reset link.
                        </p>

                        <form action="./forgetsuccess.html" id="forgotForm">
                            <div class="mb-3">
                                <input type="email" id="email" class="form-control" placeholder="Enter your email"
                                    required>
                                <small class="text-danger d-none" id="emailError">
                                    Please enter a valid email
                                </small>
                            </div>

                            <button type="submit" class="btn btn-reset w-100">
                                Send Reset Link
                            </button>
                        </form>

                        <a href="./login.html" class="back-link mt-3 d-block">
                            ← Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
